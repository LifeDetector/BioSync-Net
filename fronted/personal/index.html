<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Auditor - LifeDetector Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/globals.css">
    <script src="../assets/js/theme.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-neon: #00e5ff;
            --accent-neon: #ff3333;
            --bg-obsidian: #050505;
        }

        body {
            background-color: #050505;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        .glass-aaa {
            background: rgba(10, 15, 20, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .neon-glow {
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.2;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--primary-neon);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 0 10px var(--primary-neon);
        }

        .toggle-btn.active-human {
            background: var(--primary-neon);
            color: black;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        .toggle-btn.active-ai {
            background: var(--accent-neon);
            color: white;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.4);
        }
    </style>
</head>

<body class="p-6 lg:p-10">
    <canvas id="bg-canvas"></canvas>

    <div class="h-full flex flex-col gap-6">
        <!-- Header -->
        <header class="flex justify-between items-center glass-aaa p-6 rounded-3xl neon-glow">
            <div class="flex items-center gap-4">
                <div class="w-6 h-6 bg-[var(--primary-neon)] rounded-sm rotate-45 flex items-center justify-center">
                    <div class="w-3 h-3 bg-black rounded-sm"></div>
                </div>
                <h1 class="text-lg font-black tracking-tighter uppercase">Personal<span class="text-[var(--primary-neon)]">Auditor</span></h1>
            </div>
            <div id="statusIndicator" class="flex items-center gap-3 bg-black/40 px-4 py-2 rounded-xl border border-white/5">
                <div class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse" id="statusDot"></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-white/60" id="statusText">Connecting...</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col lg:flex-row gap-6 min-h-0">
            <!-- Video Section -->
            <div class="flex-1 relative rounded-[2.5rem] overflow-hidden glass-aaa neon-glow group">
                <div class="absolute top-8 left-8 z-20 flex items-center gap-4">
                    <span class="mono text-[10px] font-black uppercase text-[var(--primary-neon)] tracking-[0.3em]">Subject_Live_Feed</span>
                    <button onclick="location.reload()" class="bg-white/5 hover:bg-white/10 p-1 rounded border border-white/10 transition-all">
                        <svg class="w-3 h-3 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
                <video id="remoteVideo" class="w-full h-full object-cover" autoplay muted playsinline></video>
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent pointer-events-none"></div>
            </div>

            <!-- Controls Section -->
            <aside class="w-full lg:w-[400px] flex flex-col gap-6 shrink-0">
                <div class="glass-aaa p-8 rounded-[2.5rem] flex flex-col gap-8 neon-glow flex-1">
                    <div class="space-y-2">
                        <h3 class="mono text-[10px] font-black uppercase tracking-[0.4em] text-white/40">Audit_Controls</h3>
                        <p class="text-xs text-white/60">Analyze the subject's behavior and provide a manual verdict.</p>
                    </div>

                    <div class="space-y-6">
                        <!-- Verdict Toggle -->
                        <div class="space-y-3">
                            <label class="mono text-[9px] uppercase tracking-widest text-white/40">Select Verdict</label>
                            <div class="grid grid-cols-2 gap-4">
                                <button id="btnHuman" onclick="setVerdict('Human')" class="toggle-btn py-4 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-widest transition-all">Human</button>
                                <button id="btnAI" onclick="setVerdict('AI')" class="toggle-btn py-4 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-widest transition-all">AI / Fake</button>
                            </div>
                        </div>

                        <!-- Confidence Slider -->
                        <div class="space-y-4">
                            <div class="flex justify-between items-center">
                                <label class="mono text-[9px] uppercase tracking-widest text-white/40">Confidence Score</label>
                                <span id="percentLabel" class="mono text-[var(--primary-neon)] font-bold">85%</span>
                            </div>
                            <input type="range" id="percentSlider" min="0" max="100" value="85" oninput="updatePercent(this.value)">
                        </div>

                        <!-- Audio Monitor -->
                        <div class="bg-black/20 p-4 rounded-2xl border border-white/5 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 flex items-center justify-center bg-white/5 rounded-full">
                                    <svg class="w-4 h-4 text-white/40" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                                    </svg>
                                </div>
                                <span class="mono text-[10px] uppercase tracking-widest text-white/40">Audio_Monitor</span>
                            </div>
                            <button id="audioToggle" class="px-4 py-1 rounded-lg bg-white/5 border border-white/10 text-[9px] font-bold uppercase tracking-widest hover:bg-white/10">Mute</button>
                        </div>
                    </div>

                    <div class="mt-auto">
                        <button id="submitBtn" onclick="submitAudit()" class="w-full py-6 rounded-2xl bg-[var(--primary-neon)] text-black font-black uppercase tracking-[0.3em] text-[11px] shadow-[0_10px_30px_-5px_rgba(0,229,255,0.4)] hover:scale-[1.02] active:scale-[0.98] transition-all disabled:opacity-50 disabled:pointer-events-none">
                            Submit Audit Result
                        </button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script>
        const remoteVideo = document.getElementById('remoteVideo');
        const percentSlider = document.getElementById('percentSlider');
        const percentLabel = document.getElementById('percentLabel');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        
        let selectedVerdict = null;
        let pc = null;
        let ws = null;
        let myId = null;
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'default-room';

        const iceConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                {
                    urls: 'turn:openrelay.metered.ca:80',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                },
                {
                    urls: 'turn:openrelay.metered.ca:443',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                },
                {
                    urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ]
        };

        function updatePercent(val) {
            percentLabel.textContent = val + '%';
        }

        function setVerdict(type) {
            selectedVerdict = type;
            document.getElementById('btnHuman').className = 'toggle-btn py-4 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-widest transition-all ' + (type === 'Human' ? 'active-human' : '');
            document.getElementById('btnAI').className = 'toggle-btn py-4 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-widest transition-all ' + (type === 'AI' ? 'active-ai' : '');
        }

        async function createPeerConnection(targetId) {
            if (pc) pc.close();
            pc = new RTCPeerConnection(iceConfig);

            pc.ontrack = (event) => {
                console.log('[RTC] Track received:', event.track.kind);
                if (event.streams && event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    statusText.textContent = 'SECURE_STREAM_ACTIVE';
                    statusDot.className = 'w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_#00ff00]';
                }
            };

            pc.onicecandidate = (event) => {
                if (event.candidate && ws?.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'ice', candidate: event.candidate, room: roomId, target_id: targetId }));
                }
            };

            pc.onconnectionstatechange = () => {
                console.log('[RTC] State:', pc.connectionState);
                if (pc.connectionState === 'connected') {
                    statusText.textContent = 'PEER_CONNECTED';
                } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                    statusText.textContent = 'LINK_LOST_RETRYING...';
                    setTimeout(() => startCall(targetId), 2000);
                }
            };
        }

        async function startCall(targetId) {
            await createPeerConnection(targetId);
            const offer = await pc.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: true });
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({ type: 'offer', sdp: offer, room: roomId, target_id: targetId }));
        }

        function initWebSocket() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${wsProtocol}://${window.location.host}/ws/${roomId}`);

            ws.onopen = () => {
                statusText.textContent = 'WAITING_FOR_PEER';
                // Announce role
                ws.send(JSON.stringify({ type: 'join', role: 'auditor', room: roomId }));
            };

            ws.onmessage = async (event) => {
                const msg = JSON.parse(event.data);
                const senderId = msg.sender_id;

                if (msg.type === 'room_info') {
                    myId = msg.your_id;
                    return;
                }

                if (msg.target_id && msg.target_id !== myId && msg.target_id !== 'all' && msg.target_id !== 'auditor') {
                    return;
                }

                switch (msg.type) {
                    case 'join':
                        if (msg.role === 'subject') {
                            statusText.textContent = 'SUBJECT_DETECTED';
                            await startCall(senderId);
                        }
                        break;
                    case 'offer':
                        if (!msg.target_id || msg.target_id === 'auditor' || msg.target_id === 'all') {
                            await createPeerConnection(senderId);
                            await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
                            const answer = await pc.createAnswer();
                            await pc.setLocalDescription(answer);
                            ws.send(JSON.stringify({ type: 'answer', sdp: answer, room: roomId, target_id: senderId }));
                        }
                        break;
                    case 'ice':
                        if (pc && msg.candidate && (!msg.target_id || msg.target_id === 'auditor')) {
                            await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(e => console.warn(e));
                        }
                        break;
                    case 'peer_left':
                        remoteVideo.srcObject = null;
                        statusText.textContent = 'PEER_DISCONNECTED';
                        statusDot.className = 'w-2 h-2 bg-red-500 rounded-full';
                        break;
                    case 'ready':
                        // Someone new joined, re-announce ourselves
                        ws.send(JSON.stringify({ type: 'join', role: 'auditor', room: roomId }));
                        break;
                }
            };
        }

        function submitAudit() {
            if (!selectedVerdict) {
                alert('Please select a verdict (Human or AI)');
                return;
            }

            const score = parseInt(percentSlider.value);
            const data = {
                type: 'PERSONAL_RESULT',
                label: selectedVerdict,
                score: selectedVerdict === 'AI' ? (100 - score) : score, // Adjust score based on label if needed
                confidence: score,
                room: roomId,
                timestamp: Date.now()
            };

            if (ws?.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
                const btn = document.getElementById('submitBtn');
                btn.textContent = '✓ AUDIT_SUBMITTED';
                btn.classList.add('opacity-50');
                btn.disabled = true;
                setTimeout(() => {
                    btn.textContent = 'Submit Audit Result';
                    btn.classList.remove('opacity-50');
                    btn.disabled = false;
                }, 3000);
            }
        }

        // Initialize background plexus
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            particles = [];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5
                });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 229, 255, 0.5)'; ctx.fill();
            });
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const d = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
                    if (d < 150) {
                        ctx.beginPath(); ctx.strokeStyle = `rgba(0, 229, 255, ${0.2 * (1 - d / 150)})`;
                        ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        window.addEventListener('resize', resize);
        resize(); animate();
        initWebSocket();

        // Audio toggle logic
        document.getElementById('audioToggle').addEventListener('click', function() {
            remoteVideo.muted = !remoteVideo.muted;
            this.textContent = remoteVideo.muted ? 'Unmute' : 'Mute';
            this.classList.toggle('bg-white/20');
        });
    </script>
</body>

</html>
